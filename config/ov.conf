{
  "storage": {
    "workspace": "./openviking_workspace"
  },

  "log": {
    "level": "INFO",
    "output": "stdout"
  },

  "embedding": {
    "dense": {
      "api_base": "https://api.deepseek.com/v1",
      "api_key": "${DEEPSEEK_API_KEY}",
      "provider": "openai",
      "dimension": 1536,
      "model": "text-embedding-3-small"
    },
    "max_concurrent": 10,
    "text_source": "content_only",
    "max_input_tokens": 4096
  },

  "vlm": {
    "api_base": "https://api.deepseek.com/v1",
    "api_key": "${DEEPSEEK_API_KEY}",
    "provider": "openai",
    "model": "deepseek-chat",
    "max_concurrent": 100
  }
}
