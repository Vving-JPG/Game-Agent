{
  "_comment": "主配置文件 - 不包含敏感信息",
  "_keys_notice": "API Key 请配置在 keys.conf 文件中",
  
  "storage": {
    "workspace": "./openviking_workspace"
  },
  
  "log": {
    "level": "INFO",
    "output": "stdout"
  },
  
  "embedding": {
    "dense": {
      "provider": "deepseek",
      "dimension": 1024,
      "model": "deepseek-v4-flash"
    },
    "max_concurrent": 10,
    "text_source": "content_only",
    "max_input_tokens": 4096
  },
  
  "vlm": {
    "provider": "deepseek",
    "model": "deepseek-v4-flash",
    "max_concurrent": 100
  }
}
