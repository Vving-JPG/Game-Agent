{
  "_comment": "主配置文件 - 不包含敏感信息",
  "_keys_notice": "API Key 请配置在 keys.conf 文件中",
  
  "storage": {
    "workspace": "./openviking_workspace"
  },
  
  "log": {
    "level": "INFO",
    "output": "stdout"
  },
  
  "embedding": {
    "dense": {
      "provider": "volcengine",
      "dimension": 1024,
      "model": "doubao-embedding-vision-251215"
    },
    "max_concurrent": 10,
    "text_source": "content_only",
    "max_input_tokens": 4096
  },
  
  "vlm": {
    "provider": "volcengine",
    "model": "doubao-seed-2-0-pro-260215",
    "max_concurrent": 100
  }
}
